
name: Compile Native APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force Create Infrastructure
        run: |
          # Criando o manifesto
          echo '{
            "name": "rd-referencia-determinante",
            "version": "1.0.0",
            "main": "index.js",
            "dependencies": { "expo": ">=45.0.0", "react-native": "0.68.2" }
          }' > package.json
          
          # Criando o arquivo principal que o erro reclamou (App.js)
          echo "import React from 'react'; import { Text, View } from 'react-native'; export default function App() { return ( <View style={{flex: 1, justifyContent: 'center', alignItems: 'center'}}><Text>RD Referência Determinante - Pronto!</Text></View> ); }" > App.js
          
          # Criando o ponto de entrada (index.js)
          echo "import { registerRootComponent } from 'expo'; import App from './App'; registerRootComponent(App);" > index.js

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build Android Bundle
        # Este comando agora encontrará o App.js na raiz
        run: npx expo export --platform android --dev false
