
name: Compile Native APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Atualizado conforme imagem d0802fe0

      - name: Force Create RD Engine
        run: |
          # Criando o coração técnico na raiz exata
          echo '{"name":"rd-app","version":"1.0.0","main":"App.js","dependencies":{"expo":">=45.0.0","react-native":"0.68.2"}}' > package.json
          
          echo "import React from 'react'; import { Text, View } from 'react-native'; import { registerRootComponent } from 'expo'; function App() { return ( <View style={{flex: 1, justifyContent: 'center', alignItems: 'center', backgroundColor: '#000'}}><Text style={{color: '#fff', fontSize: 20}}>RD - REFERÊNCIA DETERMINANTE</Text><Text style={{color: '#fff'}}>SISTEMA OPERACIONAL</Text></View> ); } registerRootComponent(App);" > App.js

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build Android APK
        # Comando de exportação limpa
        run: npx expo export --platform android --dev false
