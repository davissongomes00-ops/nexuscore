
name: Compile Native APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force Create Package
        run: |
          echo '{
            "name": "rd-referencia-determinante",
            "version": "1.0.0",
            "main": "node_modules/expo/AppEntry.js",
            "scripts": { "start": "expo start" },
            "dependencies": { "expo": ">=45.0.0", "react-native": "0.68.2" }
          }' > package.json

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build Android Bundle
        # Este comando exporta os arquivos do APK de forma independente
        run: npx expo export --platform android --dev false
