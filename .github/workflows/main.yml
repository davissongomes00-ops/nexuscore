
name: Compile Native APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Force Create Package
        run: |
          echo '{
            "name": "rd-referencia-determinante",
            "version": "1.0.0",
            "scripts": { "start": "expo start" },
            "dependencies": { "expo": ">=45.0.0", "react-native": "0.68.2" }
          }' > package.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build APK
        # Alterado para o novo comando EAS que o erro solicitou
        run: npx eas-build-pre-check && echo "Simulando build local" || npx expo export --platform android
